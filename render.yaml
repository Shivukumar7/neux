services:
  - type: web
    name: nexus-api
    env: node
    plan: free
    buildCommand: "npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.10.0"
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: nexus-db
    databaseName: nexus
    user: nexus_user
    plan: free
