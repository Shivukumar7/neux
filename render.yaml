services:
  - type: web
    name: nexus-api
    env: node
    buildCommand: "cd client && npm install && npm run build && cd ../server && npm install"
    startCommand: "cd server && node migrate.js && node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: nexus-db
    databaseName: nexus
    user: nexus_user
